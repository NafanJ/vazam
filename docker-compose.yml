# Vazam backend — deploys as its own stack (e.g. /opt/vazam) and joins the
# existing `media-server_default` network so the running cloudflared container
# can reach it at http://vazam:8000.
#
# Secrets come from a .env next to this file: SUPABASE_URL, SUPABASE_KEY,
# HF_TOKEN, VAZAM_AUTH_USER, VAZAM_AUTH_PASS.
#
# To publish: in the Cloudflare Zero Trust dashboard, open your tunnel and add a
# Public Hostname  vazam.<yourdomain>  →  Service  http://vazam:8000
# (HTTPS is terminated at Cloudflare's edge, which the phone mic-record needs).

services:
  vazam:
    build: .
    image: vazam:latest
    container_name: vazam
    restart: unless-stopped
    env_file: .env                 # SUPABASE_URL, SUPABASE_KEY, HF_TOKEN
    environment:
      DEVICE: cpu
      DEMUCS_MODEL: htdemucs       # fast isolation on CPU
      VAZAM_AUDIO_DIR: /data/enroll-audio   # stored enrolled clips (for playback)
      # HTTP Basic auth — gates every route except /health. Set in .env.
      VAZAM_AUTH_USER: ${VAZAM_AUTH_USER:-}
      VAZAM_AUTH_PASS: ${VAZAM_AUTH_PASS:-}
    volumes:
      - vazam-models:/models       # persistent model cache (~535 MB, downloads once)
      - vazam-audio:/data/enroll-audio   # enrolled-clip audio, keyed by embedding id
    expose:
      - "8000"                     # internal only; cloudflared reaches it over the network
    networks:
      - media-server_default
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

volumes:
  vazam-models:
  vazam-audio:

networks:
  media-server_default:
    external: true                 # the network the existing cloudflared is on
